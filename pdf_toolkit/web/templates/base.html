<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/app.css">
    <link rel="stylesheet" href="/static/scan_cleanup.css">
    <script defer src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        document.addEventListener("alpine:init", () => {
            Alpine.data("scanCleanupReview", () => ({
                zoomOpen: false,
                zoomSrc: "",
                zoomLabel: "",
                zoomScale: "fit",
                openZoom(src, label) {
                    this.zoomSrc = src;
                    this.zoomLabel = label;
                    this.zoomScale = "fit";
                    this.zoomOpen = true;
                },
                resetScanDefaults(form) {
                    this.applyScanDefaults(form);
                    this.refreshScanPreview(form);
                },
                resetAllScanTuning(form) {
                    this.applyScanDefaults(form);
                    form.querySelectorAll("[data-page-override]").forEach((input) => {
                        input.value = "";
                    });
                    this.refreshScanPreview(form);
                },
                applyScanDefaults(form) {
                    form.querySelectorAll("[data-scan-default]").forEach((input) => {
                        input.value = input.dataset.scanDefault || "";
                    });
                },
                refreshScanPreview(form) {
                    this.$nextTick(() => form.querySelector("[data-preview-submit]")?.click());
                },
            }));
        });
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="/">PDF Kit</a>
            {% set current_path = request.url.path %}
            <nav class="topnav" aria-label="Tools">
                {% for nav_tool_id, nav_label in tool_nav_items %}
                    {% set nav_href = "/tools/" ~ nav_tool_id %}
                    <a
                        class="nav-pill{% if current_path == nav_href %} is-active{% endif %}"
                        href="{{ nav_href }}"
                        {% if current_path == nav_href %}aria-current="page"{% endif %}
                    >{{ nav_label }}</a>
                {% endfor %}
            </nav>
            {% if require_login %}
            <form action="/logout" method="post">
                <button class="ghost-button" type="submit">Logout</button>
            </form>
            {% endif %}
        </header>
        <main class="main-shell">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
