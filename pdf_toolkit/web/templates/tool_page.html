{% extends "base.html" %}

{% block content %}
<section class="panel panel-accent">
    <p class="eyebrow">{{ tool_id.replace("-", " ").title() }}</p>
    <h1>{{ tool.title }}</h1>
    <p class="lede">{{ tool.description }}</p>
</section>

<section class="tool-layout tool-layout-single">
    <article class="panel">
        {% include tool.form_template %}
    </article>
</section>

<section class="panel">
    <div class="section-header">
        <h2>Job Output</h2>
    </div>
    <div id="job-panel">
        <p class="muted">Submit a task to start processing.</p>
    </div>
</section>
{% endblock %}
