<div class="section-header">
    <div>
        <p class="eyebrow">Scan Cleanup Tuning</p>
        <h2>Review analysis and launch cleanup</h2>
    </div>
</div>
<div id="job-launch-panel-{{ job.id }}">
    {% include "partials/scan_settings_form.html" %}
</div>
<section class="compare-panel">
    <div
        id="scan-preview-result-{{ job.id }}"
        hx-post="/tools/scan-cleanup/{{ job.id }}/preview"
        hx-trigger="load"
        hx-include="#job-launch-panel-{{ job.id }} form"
        hx-swap="innerHTML"
    >
        <p class="muted">Generating preview for page 1...</p>
    </div>
</section>
<div
    class="zoom-overlay"
    x-show="zoomOpen"
    x-cloak
    x-on:keydown.escape.window="zoomOpen = false"
    role="dialog"
    aria-modal="true"
    x-bind:aria-label="zoomLabel"
>
    <div class="zoom-toolbar">
        <strong x-text="zoomLabel"></strong>
        <div class="zoom-actions" aria-label="Zoom controls">
            <button type="button" class="ghost-button mini-button" x-on:click="zoomScale = 'fit'">Fit</button>
            <button type="button" class="ghost-button mini-button" x-on:click="zoomScale = '1'">100%</button>
            <button type="button" class="ghost-button mini-button" x-on:click="zoomScale = '1.5'">150%</button>
            <button type="button" class="ghost-button mini-button" x-on:click="zoomScale = '2'">200%</button>
            <button type="button" class="primary-button mini-button" x-on:click="zoomOpen = false">Close</button>
        </div>
    </div>
    <div class="zoom-stage" x-on:click.self="zoomOpen = false">
        <img
            class="zoom-image"
            x-bind:class="zoomScale === 'fit' ? 'zoom-image-fit' : 'zoom-image-scaled'"
            x-bind:src="zoomSrc"
            x-bind:alt="zoomLabel"
            x-bind:style="zoomScale === 'fit' ? '' : 'width: ' + (Number(zoomScale) * 100) + '%; max-width: none; max-height: none;'"
        >
    </div>
</div>
