<form
    class="stacked-form"
    hx-post="/tools/scan-cleanup/{{ job.id }}/process"
    hx-target="#job-launch-panel"
    hx-swap="innerHTML"
>
    <div class="triple-grid">
        <label>
            Strength
            <input type="number" name="strength" step="0.05" min="0" max="1" value="0.65">
        </label>
        <label>
            White Point
            <input type="number" name="white_point" step="1" min="215" max="252" value="242">
        </label>
        <label>
            Contrast
            <input type="number" name="contrast" step="0.05" min="0.7" max="1.6" value="1.05">
        </label>
    </div>
    <details class="panel inset-panel">
        <summary>Optional Page Overrides</summary>
        <div class="override-grid">
            {% for page in job.analysis.pages %}
                <div class="override-card">
                    <strong>Page {{ page.page_number }}</strong>
                    <label>
                        Strength
                        <input type="number" name="page_{{ page.page_number }}_strength" step="0.05" min="0" max="1">
                    </label>
                    <label>
                        White Point
                        <input type="number" name="page_{{ page.page_number }}_white_point" step="1" min="215" max="252">
                    </label>
                    <label>
                        Contrast
                        <input type="number" name="page_{{ page.page_number }}_contrast" step="0.05" min="0.7" max="1.6">
                    </label>
                </div>
            {% endfor %}
        </div>
    </details>
    <button class="primary-button" type="submit">Run Cleanup</button>
</form>
