<form
    class="stacked-form"
    hx-post="/tools/mixed-to-pdf/{{ job_id }}/submit"
    hx-target="#job-panel"
    hx-swap="innerHTML"
    x-data="{
        renumber() {
            this.$root.querySelectorAll('.order-index').forEach((element, index) => {
                element.textContent = index + 1;
            });
        },
        moveRow(button, direction) {
            const row = button.closest('.order-row');
            const sibling = direction < 0 ? row.previousElementSibling : row.nextElementSibling;
            if (!sibling) {
                return;
            }
            if (direction < 0) {
                row.parentNode.insertBefore(row, sibling);
            } else {
                row.parentNode.insertBefore(sibling, row);
            }
            this.renumber();
        }
    }"
>
    <div class="section-header">
        <h2>Review Order</h2>
        <p class="muted">Use the controls to set the whole-file order.</p>
    </div>

    <div class="order-list">
        {% for item in items %}
            <div class="order-row" data-file-id="{{ item.id }}" data-ordered-file-id="{{ item.id }}">
                <input type="hidden" name="ordered_file_ids" value="{{ item.id }}">
                <span class="order-index">{{ loop.index }}</span>
                <div class="order-meta">
                    <strong>{{ item.name }}</strong>
                    <span>{{ item.kind }}</span>
                </div>
                <div class="order-actions">
                    <button
                        class="ghost-button mini-button"
                        type="button"
                        @click="moveRow($el, -1)"
                    >
                        Up
                    </button>
                    <button
                        class="ghost-button mini-button"
                        type="button"
                        @click="moveRow($el, 1)"
                    >
                        Down
                    </button>
                </div>
            </div>
        {% endfor %}
    </div>

    <label>
        Fallback DPI
        <input type="number" name="fallback_dpi" min="72" max="600" step="1" value="300">
    </label>
    <label>
        JPEG Quality
        <input type="number" name="jpeg_quality" min="70" max="100" step="1" value="95">
    </label>
    <label>
        Page Size
        <select name="page_size">
            <option value="original" selected>Original</option>
            <option value="a4">A4</option>
            <option value="letter">Letter</option>
        </select>
    </label>
    <label>
        Margin (mm)
        <input type="number" name="margin_mm" min="0" max="50" step="0.5" value="0">
    </label>
    <label>
        Placement
        <select name="placement">
            <option value="fit" selected>Fit</option>
            <option value="fill">Fill</option>
        </select>
    </label>
    <button class="primary-button" type="submit">Build Mixed PDF</button>
</form>
