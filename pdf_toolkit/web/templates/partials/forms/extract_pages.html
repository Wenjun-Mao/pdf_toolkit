<form
    class="stacked-form"
    hx-post="/tools/extract-pages/submit"
    hx-target="#job-panel"
    hx-swap="innerHTML"
    hx-encoding="multipart/form-data"
>
    <label>
        Source PDF
        <input type="file" name="file" accept="application/pdf" required>
    </label>
    <label>
        Page Range
        <input type="text" name="page_spec" placeholder="1,3-5,8-10" required>
    </label>
    <button class="primary-button" type="submit">Queue Extraction</button>
</form>
