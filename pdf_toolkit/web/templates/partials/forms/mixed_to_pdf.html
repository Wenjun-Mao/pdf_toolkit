<form
    class="stacked-form"
    hx-post="/tools/mixed-to-pdf/upload"
    hx-target="#job-panel"
    hx-swap="innerHTML"
    hx-encoding="multipart/form-data"
>
    <label>
        PDF and Image Files
        <input type="file" name="files" accept="application/pdf,image/*" multiple required>
    </label>
    <button class="primary-button" type="submit">Review Order</button>
</form>
